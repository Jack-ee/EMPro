name: Build audio pack

# Builds the EMPro pronunciation pack and publishes it as a Release asset.
#
# Runs when:
#   - tools/wordlist.txt changes on the main branch, or
#   - it is started by hand from the Actions tab (Run workflow).
#
# Setup needed once:
#   Settings -> Secrets and variables -> Actions -> New repository secret
#     name : OPENAI_API_KEY
#     value: your OpenAI API key (sk-...)
#   The key stays encrypted in the secret and never reaches the app.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max words to synthesise this run (blank = all). Use a small number for a test run."
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - tools/wordlist.txt

# The job updates a Release, so it needs write access to repository contents.
permissions:
  contents: write

# One build at a time; a newer run waits rather than racing the release.
concurrency:
  group: audio-pack
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build pronunciation pack
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PACK_RELEASE_TAG: audio-pack
          # Empty on a push event; set only for a manual test run.
          PACK_LIMIT: ${{ inputs.limit }}
        run: |
          if [ -n "$PACK_LIMIT" ]; then
            echo "Test run: limiting to $PACK_LIMIT word(s)."
            python tools/generate_audio_pack.py --limit "$PACK_LIMIT"
          else
            python tools/generate_audio_pack.py
          fi

      - name: Publish pack to the audio-pack release
        # always() so that if the build stops early (e.g. the OpenAI usage
        # limit is hit), the partial pack written so far is still published.
        # The next run then continues from it instead of starting over.
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: audio-pack
          name: EMPro audio pack
          # A no-op run produces no delta file; skip it instead of failing.
          fail_on_unmatched_files: false
          body: >
            Pre-generated pronunciation audio for EMPro. This release is
            updated in place by the Build audio pack workflow. The download
            URLs are stable, so the app can always fetch the latest pack
            from the same address.
          files: |
            tools/dist/empro-audio-pack.empack
            tools/dist/empro-audio-pack.delta.empack
            tools/dist/empro-audio-pack.manifest.json
